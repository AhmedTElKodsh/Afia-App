name: Deploy On CI Success

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'local-model')
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: cd worker && npm ci

      - name: Apply KV namespace IDs to wrangler.toml
        run: bash scripts/apply-wrangler-kv-ids.sh
        env:
          CLOUDFLARE_RATE_LIMIT_KV_ID: ${{ secrets.CLOUDFLARE_RATE_LIMIT_KV_ID }}
          CLOUDFLARE_RATE_LIMIT_KV_PREVIEW_ID: ${{ secrets.CLOUDFLARE_RATE_LIMIT_KV_PREVIEW_ID }}

      - name: Sync admin password secret to Worker
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "master" ]; then
            cd worker && echo "${{ secrets.VITE_ADMIN_PASSWORD }}" | npx wrangler secret put ADMIN_PASSWORD --env stage1
          else
            cd worker && echo "${{ secrets.VITE_ADMIN_PASSWORD }}" | npx wrangler secret put ADMIN_PASSWORD --env stage2
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "master" ]; then
            cd worker && npx wrangler deploy --env stage1
          else
            cd worker && npx wrangler deploy --env stage2
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'local-model')
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.CLOUDFLARE_WORKER_URL || 'https://afia-worker.savola.workers.dev' }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_STAGE: ${{ github.event.workflow_run.head_branch == 'master' && 'stage1' || 'stage2' }}
          VITE_ENABLE_LOCAL_MODEL: ${{ github.event.workflow_run.head_branch == 'master' && 'false' || 'true' }}

      - name: Remove auto-generated wrangler configs
        run: rm -f dist/wrangler.json && rm -rf .wrangler/

      - name: Deploy Pages
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "master" ]; then
            npx wrangler pages deploy dist --project-name=afia-app --branch=master
          else
            npx wrangler pages deploy dist --project-name=afia-app --branch=local-model
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
