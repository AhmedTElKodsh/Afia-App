name: Deploy Stage 1 (LLM API Only)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run Tests (Stage 1)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        env:
          STAGE: 'stage1'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E tests (Stage 1)
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.CLOUDFLARE_WORKER_URL || 'https://afia-worker.savona.workers.dev' }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD || '1234' }}
          VITE_STAGE: 'stage1'

      - name: Run E2E tests (functional)
        run: npx playwright test tests/e2e/
        env:
          CI: true
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD || '1234' }}
          VITE_STAGE: 'stage1'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-stage1
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy-worker-stage1:
    name: Deploy Worker (Stage 1 - LLM API)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Worker dependencies
        run: cd worker && npm ci

      - name: Deploy Worker (Stage 1)
        run: cd worker && npx wrangler deploy --env stage1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages-stage1:
    name: Deploy Pages (Stage 1)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build PWA (Stage 1)
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.CLOUDFLARE_WORKER_URL || 'https://afia-worker.savona.workers.dev' }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD || '1234' }}
          VITE_STAGE: 'stage1'

      - name: Remove auto-generated wrangler configs
        run: rm -f dist/wrangler.json && rm -rf .wrangler/

      - name: Deploy to Cloudflare Pages (Stage 1)
        run: npx wrangler pages deploy dist --project-name=afia-app --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment deployment URL
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '🚀 **Stage 1 Deployed** (LLM API Only)\n\n✅ Worker: https://afia-worker.savona.workers.dev\n✅ Pages: https://afia-app.pages.dev'
            })
