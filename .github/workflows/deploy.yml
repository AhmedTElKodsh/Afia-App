name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install PWA dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Type-check Worker
        run: |
          cd worker
          npm ci
          npx tsc --noEmit

  build:
    name: Build PWA
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL || 'https://safi-worker.savola.workers.dev' }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: cd worker && npm ci

      - name: Deploy Worker to Cloudflare
        run: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages-production:
    name: Deploy PWA (Production)
    runs-on: ubuntu-latest
    needs: [build, deploy-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy dist \
            --project-name=safi-oil-tracker \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages-preview:
    name: Deploy PWA (Preview)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy Preview to Cloudflare Pages
        id: pages-preview
        run: |
          OUTPUT=$(npx wrangler pages deploy dist \
            --project-name=safi-oil-tracker \
            --branch=pr-${{ github.event.number }} \
            2>&1)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.pages-preview.outputs.preview_url }}';
            const body = previewUrl
              ? `### Preview Deployment\n\n🚀 **[Open Preview](${previewUrl})**\n\nTest with:\n- [\`?sku=filippo-berio-500ml\`](${previewUrl}/?sku=filippo-berio-500ml)\n- [\`?sku=bertolli-750ml\`](${previewUrl}/?sku=bertolli-750ml)\n- [\`?sku=safi-sunflower-1l\`](${previewUrl}/?sku=safi-sunflower-1l)`
              : '### Preview Deployment\n\nDeployment completed. Check the Actions log for the preview URL.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
