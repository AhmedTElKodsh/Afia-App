name: Stage 1 Demo

on:
  push:
    branches:
      - stage-1-demo
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage-1-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-demo:
    name: Validate Demo Branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
