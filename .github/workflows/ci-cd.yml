name: CI/CD Pipeline

on:
  push:
    branches: [master, local-model]
  pull_request:
    branches: [master, local-model]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test
      - name: Install worker dependencies
        run: cd worker && npm ci
      - name: Run worker unit tests
        run: cd worker && npm run test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install worker dependencies
        run: cd worker && npm ci
      - name: Create worker dev vars
        run: |
          cat > worker/.dev.vars << 'EOF'
          ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY2=${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3=${{ secrets.GEMINI_API_KEY3 }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF
      - name: Start worker
        run: cd worker && npx wrangler dev --config ./wrangler.toml --port 8787 --local &
      - name: Wait for worker
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8787/health > /dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Run integration tests
        run: npm run test:integration
        env:
          ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Build for E2E
        run: npm run build
        env:
          VITE_PROXY_URL: 'https://afia-worker.savola.workers.dev'
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_STAGE: 'stage1'
      - name: Run E2E tests
        run: npx playwright test tests/e2e/
        env:
          CI: true

  deploy-worker:
    name: Deploy Worker
    needs: [unit-tests, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/local-model')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install worker dependencies
        run: cd worker && npm ci
      - name: Apply KV namespace IDs to wrangler.toml
        run: bash scripts/apply-wrangler-kv-ids.sh
        env:
          CLOUDFLARE_RATE_LIMIT_KV_ID: ${{ secrets.CLOUDFLARE_RATE_LIMIT_KV_ID }}
          CLOUDFLARE_RATE_LIMIT_KV_PREVIEW_ID: ${{ secrets.CLOUDFLARE_RATE_LIMIT_KV_PREVIEW_ID }}
      - name: Deploy Worker
        run: |
          ENVIRONMENT="${{ github.ref == 'refs/heads/master' && 'stage1' || 'stage2' }}"
          cd worker && npx wrangler deploy --env $ENVIRONMENT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy Pages
    needs: deploy-worker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/local-model')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and Deploy Pages
        run: |
          ENVIRONMENT="${{ github.ref == 'refs/heads/master' && 'stage1' || 'stage2' }}"
          npm run build
          npx wrangler pages deploy dist --project-name=afia-app --branch=${{ github.ref == 'refs/heads/master' && 'master' || 'local-model' }}
        env:
          VITE_PROXY_URL: 'https://afia-worker.savola.workers.dev'
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
