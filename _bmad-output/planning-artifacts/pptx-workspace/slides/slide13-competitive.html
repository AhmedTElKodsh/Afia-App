<!DOCTYPE html><html><head><style>
html{background:#F8F9FA}
body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;display:flex;background:#F5F8F5;}
.sidebar{width:6pt;height:405pt;position:absolute;left:0;top:0;background:#2D6A4F;}
.content{margin:36pt 30pt 20pt 48pt;flex:1;display:flex;flex-direction:column;}
h1{color:#2D6A4F;font-size:28pt;margin:0 0 6pt 0;}
.bar{width:50pt;height:3pt;background:#E9A820;margin-bottom:14pt;}
.cols{display:flex;gap:20pt;flex:1;}
.left{flex:1;}
.right{width:280pt;display:flex;align-items:center;justify-content:center;}
.comp{display:flex;align-items:center;margin-bottom:10pt;padding:10pt 14pt;background:white;border-radius:8pt;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.comp-icon{width:10pt;height:10pt;border-radius:50%;margin-right:12pt;min-width:10pt;}
.vs{color:#6C757D;font-size:9pt;font-style:italic;}
.winner{background:#2D6A4F;border-radius:8pt;padding:14pt;margin-top:6pt;}
</style></head><body>
<div class="sidebar"></div>
<div class="content">
  <h1>Competitive Advantage</h1>
  <div class="bar"></div>
  <div class="cols">
    <div class="left">
      <p style="color:#2D6A4F;font-size:11pt;font-weight:bold;margin:0 0 10pt 0;">No direct competitor exists</p>
      <div class="comp">
        <div class="comp-icon" style="background:#D64045;"></div>
        <div>
          <p style="color:#1A1A2E;font-size:11pt;font-weight:bold;margin:0;">vs MyFitnessPal</p>
          <p class="vs" style="margin:2pt 0 0 0;">High friction manual logging</p>
        </div>
      </div>
      <div class="comp">
        <div class="comp-icon" style="background:#D64045;"></div>
        <div>
          <p style="color:#1A1A2E;font-size:11pt;font-weight:bold;margin:0;">vs Smart Scales</p>
          <p class="vs" style="margin:2pt 0 0 0;">Requires hardware purchase</p>
        </div>
      </div>
      <div class="comp">
        <div class="comp-icon" style="background:#D64045;"></div>
        <div>
          <p style="color:#1A1A2E;font-size:11pt;font-weight:bold;margin:0;">vs Receipt Scanning</p>
          <p class="vs" style="margin:2pt 0 0 0;">Scans labels, not actual content</p>
        </div>
      </div>
      <div class="winner">
        <p style="color:#E9A820;font-size:12pt;font-weight:bold;margin:0;">Afia Oil Tracker</p>
        <p style="color:white;font-size:10pt;margin:4pt 0 0 0;">Zero friction + Zero hardware + Self-improving AI</p>
      </div>
    </div>
    <div class="right">
      <img src="competitive.png" style="width:260pt;height:218pt;">
    </div>
  </div>
</div>
</body></html>
