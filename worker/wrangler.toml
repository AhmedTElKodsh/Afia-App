name = "afia-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret env vars (secrets set via `wrangler secret put`)
ALLOWED_ORIGINS = "https://afia-app.pages.dev,https://afia-oil-tracker.pages.dev,http://localhost:5173,http://localhost:4173"
# Supabase configuration for persistent storage
SUPABASE_URL = "https://anfgqdgcbvmyegbfvvfh.supabase.co"
# Set to "true" to include reasoning field in LLM output (adds ~30-50 output tokens)
DEBUG_REASONING = "false"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "9dc0bcc958de473199e5ded5701b932a"
preview_id = "d6d688f5cfd04d73a42c7c979c1f1791"

# Secrets (set via wrangler CLI — never commit actual values):
# Supabase Anon Key (for training data storage):
#   wrangler secret put SUPABASE_ANON_KEY
# Gemini API Keys (3 keys for fallback/rotation):
#   wrangler secret put GEMINI_API_KEY       # Primary key
#   wrangler secret put GEMINI_API_KEY2      # Fallback key 1
#   wrangler secret put GEMINI_API_KEY3      # Fallback key 2
# Groq API Key (fallback if all Gemini keys fail):
#   wrangler secret put GROQ_API_KEY
